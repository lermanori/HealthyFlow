name: Sync Ledger to Wiki

# Runs whenever LEDGER.md changes on main (i.e. after every commit,
# since the post-commit hook amends the commit to include a ledger update).
on:
  push:
    branches: [main]
    paths: [LEDGER.md]

permissions:
  contents: write  # needed to push to the wiki repo

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone wiki
        run: |
          git clone \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" \
            wiki

      - name: Copy ledger to wiki
        run: cp LEDGER.md wiki/Ledger.md

      - name: Commit and push to wiki
        run: |
          cd wiki
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Ledger.md
          # Only commit if there's actually something new
          git diff --staged --quiet || \
            git commit -m "sync: ledger updated from ${{ github.sha }}"
          git push
